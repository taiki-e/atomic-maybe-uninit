          - rust: stable
            target: arm-unknown-linux-gnueabi
            runner: native
            os: ubuntu-24.04-arm
            container: debian:13-slim
          # - rust: beta
          #   target: arm-unknown-linux-gnueabi
          #   runner: native
          #   os: ubuntu-24.04-arm
          #   container: debian:13-slim
          - rust: nightly
            target: arm-unknown-linux-gnueabi
            runner: native
            os: ubuntu-24.04-arm
            container: debian:13-slim
          # We test only one version because we do not have soft-float-specific code and
          # Armv7-specific code is also tested on hard-float target using multiple versions.
          # - rust: '1.74' # LLVM 17 (oldest version that MaybeUninit register is supported)
          #   target: armv7-unknown-linux-gnueabi
