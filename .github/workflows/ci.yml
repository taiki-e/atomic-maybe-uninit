          #   container: debian:13-slim
          # - rust: '1.94' # LLVM 21
          #   target: armv7-unknown-linux-gnueabi
          #   runner: native
          #   os: ubuntu-24.04-arm
          #   container: debian:13-slim
          # - rust: stable
          #   target: armv7-unknown-linux-gnueabi
          #   runner: native
          #   os: ubuntu-24.04-arm
          #   container: debian:13-slim
          # - rust: beta
          #   target: armv7-unknown-linux-gnueabi
          #   runner: native
